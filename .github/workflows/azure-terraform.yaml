name: Azure Terraform pipeline (OCI back-end)

on:
  push:
    branches:
      - main
    paths:
      - 'azure/**'
  pull_request:
    branches:
      - main
    paths:
      - 'azure/**'

  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_ACTION_WORKSPACE: default
  SCENARIO: azure
  CORE_MODULE_VERSION: v0.0.17

jobs:
  projects:
    name: project
    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read

    steps:
    # ------------------------------------------------------------------
    # 1. Checkout & tooling
    # ------------------------------------------------------------------
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    # ------------------------------------------------------------------
    # 2. Clone Azure orchestrator
    # ------------------------------------------------------------------
    - name: Clone Orchestrator Module
      run: |
        git clone https://github.com/iblake/clickops-orchestrator-azure.git ORCH

    # ------------------------------------------------------------------
    # 3. Azure credentials
    # ------------------------------------------------------------------
    - name: Export ARM credentials
      run: |
        echo "ARM_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }}" >> $GITHUB_ENV
        echo "ARM_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }}" >> $GITHUB_ENV
        echo "ARM_TENANT_ID=${{ secrets.ARM_TENANT_ID }}" >> $GITHUB_ENV
        echo "ARM_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

    - name: Azure CLI Login
      run: |
        az login --service-principal \
          --username ${{ secrets.ARM_CLIENT_ID }} \
          --password ${{ secrets.ARM_CLIENT_SECRET }} \
          --tenant ${{ secrets.ARM_TENANT_ID }}
        az account set --subscription ${{ secrets.ARM_SUBSCRIPTION_ID }}

    # ------------------------------------------------------------------
    # 4. Terraform binary
    # ------------------------------------------------------------------
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.1
        terraform_wrapper: true

    # ------------------------------------------------------------------
    # 5. Render versions.tf from template
    # ------------------------------------------------------------------
    - name: Render versions.tf from template
      working-directory: ${{ github.workspace }}/ORCH
      run: |
        envsubst < versions.tf.template > versions.tf
        terraform fmt versions.tf
      env:
        OCI_TF_STATE_BUCKET:    ${{ vars.OCI_TF_STATE_BUCKET }}
        OCI_TF_STATE_NAMESPACE: ${{ vars.OCI_TF_STATE_NAMESPACE }}
        OCI_REGION:             ${{ vars.OCI_REGION }}

    # ------------------------------------------------------------------
    # 6. SSH key
    # ------------------------------------------------------------------
    - name: Generate SSH Key
      id: ssh-key
      run: |
        KEY_PATH="$HOME/.ssh/azure_vm_key"
        if [ ! -f "$KEY_PATH" ]; then
          ssh-keygen -t rsa -b 4096 -f "$KEY_PATH" -N ""
        fi
        echo "SSH_PUBLIC_KEY=$(cat $KEY_PATH.pub)" >> $GITHUB_OUTPUT

    # ------------------------------------------------------------------
    # 7. Terraform workflow
    # ------------------------------------------------------------------
    - name: Terraform Init
      id: init
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform init

    - name: Terraform Format
      id: format
      if: github.ref != 'refs/heads/main'
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform fmt -check

    - name: Terraform Validate
      id: validate
      if: github.ref != 'refs/heads/main' && (success() || failure())
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform validate -no-color

    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: |
        cd ${{ github.workspace }}/ORCH
        SCENARIO_DIR=${{ github.workspace }}/$SCENARIO
        VARS=$(find $SCENARIO_DIR -name '*.json')
        echo "$VARS"
        terraform plan -no-color $(for i in $VARS; do echo "-var-file $i"; done) -out=tfplan.binary
      env:
        TF_VAR_vm_ssh_public_key: ${{ steps.ssh-key.outputs.SSH_PUBLIC_KEY }}

    - name: Update Pull Request
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request' && (success() || failure())
      env:
        PLAN: "${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Format and Style 🖌\`${{ steps.format.outcome }}\`
          #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
          #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
          #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

          <details><summary>Show Plan</summary>

          \`\`\`terraform
          ${process.env.PLAN}
          \`\`\`

          </details>

          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    - name: Terraform Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        cd ${{ github.workspace }}/ORCH
        SCENARIO_DIR=${{ github.workspace }}/$SCENARIO
        VARS=$(find $SCENARIO_DIR -name '*.json')
        echo "$VARS"
        terraform apply -auto-approve $(for i in $VARS; do echo "-var-file $i"; done)
      env:
        TF_VAR_vm_ssh_public_key: ${{ steps.ssh-key.outputs.SSH_PUBLIC_KEY }}