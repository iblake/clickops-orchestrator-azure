name: Azure Terraform GitOps (OCI back-end)

on:
  pull_request:
    branches:
      - main
    paths:
      - 'azure/**'
  pull_request_target:
    types:
      - closed
    branches:
      - main
    paths:
      - 'azure/**'

  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_ACTION_WORKSPACE: default
  SCENARIO: azure
  CORE_MODULE_VERSION: v0.0.17

jobs:
  terraform:
    name: Terraform
    runs-on: self-hosted
    permissions:
      contents: read
      pull-requests: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Clone Azure Orchestrator
      run: git clone https://github.com/iblake/clickops-orchestrator-azure.git ORCH

    - name: Export ARM credentials
      run: |
        echo "ARM_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }}" >> $GITHUB_ENV
        echo "ARM_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }}" >> $GITHUB_ENV
        echo "ARM_TENANT_ID=${{ secrets.ARM_TENANT_ID }}" >> $GITHUB_ENV
        echo "ARM_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

    - name: Azure CLI Login
      run: |
        az login --service-principal \
          --username ${{ secrets.ARM_CLIENT_ID }} \
          --password ${{ secrets.ARM_CLIENT_SECRET }} \
          --tenant ${{ secrets.ARM_TENANT_ID }}
        az account set --subscription ${{ secrets.ARM_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.1
        terraform_wrapper: true

    - name: Render versions.tf from template
      working-directory: ${{ github.workspace }}/ORCH
      run: |
        envsubst < versions.tf.template > versions.tf
        terraform fmt versions.tf
      env:
        OCI_TF_STATE_BUCKET:    ${{ vars.OCI_TF_STATE_BUCKET }}
        OCI_TF_STATE_NAMESPACE: ${{ vars.OCI_TF_STATE_NAMESPACE }}
        OCI_REGION:             ${{ vars.OCI_REGION }}

    - name: Terraform Init
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform init

    - name: Terraform Format
      if: github.event_name == 'pull_request'
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform fmt -check

    - name: Terraform Validate
      if: github.event_name == 'pull_request'
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform validate -no-color

    - name: Terraform Plan
      if: github.event_name == 'pull_request'
      id: plan
      run: |
        cd ${{ github.workspace }}/ORCH
        SCENARIO_DIR=${{ github.workspace }}/$SCENARIO
        VARS=$(find $SCENARIO_DIR -name '*.json')
        echo "$VARS"
        terraform plan -detailed-exitcode -no-color $(for i in $VARS; do echo "-var-file $i"; done) -out=tfplan.binary
        echo "plan-exit-code=$?" >> $GITHUB_OUTPUT
      env:
        TF_VAR_vm_ssh_public_key: ${{ steps.ssh-key.outputs.SSH_PUBLIC_KEY }}

    - name: Upload plan artifact
      if: github.event_name == 'pull_request'
      uses: actions/upload-artifact@v4
      with:
        name: terraform-plan
        path: ${{ github.workspace }}/ORCH/tfplan.binary

    - name: Post PR comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        PLAN: ${{ steps.plan.outputs.stdout }}
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Format 🖌 \`${{ steps.format.outcome }}\`
          #### Terraform Validate 🤖 \`${{ steps.validate.outcome }}\`
          #### Terraform Plan 📖 \`${{ steps.plan.outcome }}\`

          <details><summary>Show Plan</summary>

          \`\`\`terraform
          ${process.env.PLAN}
          \`\`\`

          </details>

          *Pushed by: @${{ github.actor }}*`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          });

    - name: Generate SSH key
      id: ssh-key
      run: |
        KEY_PATH="$HOME/.ssh/azure_vm_key"
        if [ ! -f "$KEY_PATH" ]; then
          ssh-keygen -t rsa -b 4096 -f "$KEY_PATH" -N ""
        fi
        echo "SSH_PUBLIC_KEY=$(cat $KEY_PATH.pub)" >> $GITHUB_OUTPUT

    - name: Terraform Apply (on PR merge)
      if: >
        github.event_name == 'pull_request_target' &&
        github.event.action == 'closed' &&
        github.event.pull_request.merged == true
      run: |
        cd ${{ github.workspace }}/ORCH
        SCENARIO_DIR=${{ github.workspace }}/$SCENARIO
        VARS=$(find $SCENARIO_DIR -name '*.json')
        terraform apply -auto-approve $(for i in $VARS; do echo "-var-file $i"; done)
      env:
        TF_VAR_vm_ssh_public_key: ${{ steps.ssh-key.outputs.SSH_PUBLIC_KEY }}