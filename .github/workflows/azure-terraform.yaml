name: Azure Terraform pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'azure/**'
  pull_request:
    branches:
      - main
    paths:
      - 'azure/**'

  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

jobs:
  projects:
    name: project
    env:
      TF_ACTION_WORKSPACE: default
      SCENARIO: azure
      CORE_MODULE_VERSION: v0.0.17

    runs-on: self-hosted
    permissions:
      pull-requests: write
      contents: read

    steps:
    # Checkout the repository
    - name: Checkout
      uses: actions/checkout@v4

    # Node
    - name: Setup Node
      uses: actions/setup-node@v2
      with:
        node-version: '20'

    # Clone orchestrator module
    - name: Clone Orchestrator Module
      run: git clone https://github.com/iblake/clickops-orchestrator-azure.git ORCH

    # Export ARM Service-Principal credentials (no OIDC)
    - name: Export ARM credentials
      run: |
        echo "ARM_CLIENT_ID=${{ secrets.ARM_CLIENT_ID }}" >> $GITHUB_ENV
        echo "ARM_CLIENT_SECRET=${{ secrets.ARM_CLIENT_SECRET }}" >> $GITHUB_ENV
        echo "ARM_TENANT_ID=${{ secrets.ARM_TENANT_ID }}" >> $GITHUB_ENV
        echo "ARM_SUBSCRIPTION_ID=${{ secrets.ARM_SUBSCRIPTION_ID }}" >> $GITHUB_ENV

    # Login to Azure CLI using Service Principal
    - name: Azure CLI Login
      run: |
        az login --service-principal \
          --username ${{ secrets.ARM_CLIENT_ID }} \
          --password ${{ secrets.ARM_CLIENT_SECRET }} \
          --tenant ${{ secrets.ARM_TENANT_ID }}
        az account set --subscription ${{ secrets.ARM_SUBSCRIPTION_ID }}

    # Install Terraform
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.1
        terraform_wrapper: true

 # Setup Terraform backend using OCI Object Storage
    - name: Setup Orchestrator OCI Backend for Azure
      run: |
        cat > ${{ github.workspace }}/ORCH/versions.tf << 'EOF'
        terraform {
          required_providers {
            azurerm = {
              source  = "hashicorp/azurerm"
              version = "~> 4.37"
            }
            null = {
              source  = "hashicorp/null"
              version = "~> 3.2"
            }
          }
          required_version = ">= 1.6"

          backend "oci" {
            bucket    = "__BUCKET__"
            namespace = "__NAMESPACE__"
            auth      = "InstancePrincipal"
            region    = "__REGION__"
            key       = "azure-orchestrator.tfstate"
          }
        }

        provider "azurerm" {
          features {}
        }
        EOF

        sed -i "s|__BUCKET__|${{ vars.OCI_TF_STATE_BUCKET }}|g" \
               ${{ github.workspace }}/ORCH/versions.tf
        sed -i "s|__NAMESPACE__|${{ vars.OCI_TF_STATE_NAMESPACE }}|g" \
               ${{ github.workspace }}/ORCH/versions.tf
        sed -i "s|__REGION__|${{ vars.OCI_REGION }}|g" \
               ${{ github.workspace }}/ORCH/versions.tf

        terraform fmt ${{ github.workspace }}/ORCH/versions.tf

        # Generate SSH key idempotently
    - name: Generate SSH Key
      id: ssh-key
      run: |
        KEY_PATH="$HOME/.ssh/azure_vm_key"
        if [ ! -f "$KEY_PATH" ]; then
          ssh-keygen -t rsa -b 4096 -f "$KEY_PATH" -N ""
        fi
        echo "SSH_PUBLIC_KEY=$(cat $KEY_PATH.pub)" >> $GITHUB_OUTPUT

    # Terraform Init
    - name: Terraform Init
      id: init
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform init

    # Terraform Format (PR only)
    - name: Terraform Format
      id: format
      if: github.ref != 'refs/heads/main'
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform fmt -check

    # Terraform Validate (PR only)
    - name: Terraform Validate
      id: validate
      if: github.ref != 'refs/heads/main' && (success() || failure())
      run: |
        cd ${{ github.workspace }}/ORCH
        terraform validate -no-color

    # Terraform Plan (PR only)
    - name: Terraform Plan
      id: plan
      if: github.event_name == 'pull_request'
      run: |
        cd ${{ github.workspace }}/ORCH
        SCENARIO_DIR=${{ github.workspace }}/$SCENARIO
        VARS=$(find $SCENARIO_DIR -name '*.json')
        echo "$VARS"
        terraform plan -no-color $(for i in $VARS; do echo "-var-file $i"; done) -out=tfplan.binary
      env:
        TF_VAR_vm_ssh_public_key: ${{ steps.ssh-key.outputs.SSH_PUBLIC_KEY }}

    # Post plan summary as PR comment
    - name: Update Pull Request
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request' && (success() || failure())
      env:
        PLAN: "${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const output = `#### Terraform Format and Style 🖌\`${{ steps.format.outcome }}\`
          #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
          #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
          #### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

          <details><summary>Show Plan</summary>

          \`\`\`terraform
          ${process.env.PLAN}
          \`\`\`

          </details>

          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })

    # Fail if plan failed
    - name: Terraform Plan Status
      if: steps.plan.outcome == 'failure'
      run: exit 1

    # Terraform Apply (push to main only)
    - name: Terraform Apply
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        cd ${{ github.workspace }}/ORCH
        SCENARIO_DIR=${{ github.workspace }}/$SCENARIO
        VARS=$(find $SCENARIO_DIR -name '*.json')
        echo "$VARS"
        terraform apply -auto-approve $(for i in $VARS; do echo "-var-file $i"; done)
      env:
        TF_VAR_vm_ssh_public_key: ${{ steps.ssh-key.outputs.SSH_PUBLIC_KEY }}