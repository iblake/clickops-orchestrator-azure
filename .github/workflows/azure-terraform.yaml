name: Azure Terraform Orchestrator Pipeline (OCI Pattern)

on:
  push:
    branches:
      - main
      - feature/orchestrator-modular
    paths:
      - 'config/**'        # ✅ JSON configuration files
      - '*.tf'             # ✅ Terraform files  
      - 'locals.tf'        # ✅ JSON processing logic
      - 'variables.tf'     # ✅ Variable definitions
  pull_request:
    branches:
      - main
    paths:
      - 'config/**'        # ✅ JSON configuration files
      - '*.tf'             # ✅ Terraform files
      - 'locals.tf'        # ✅ JSON processing logic  
      - 'variables.tf'     # ✅ Variable definitions

  workflow_dispatch:
    inputs:
      deployment_type:
        description: "Deployment Type"
        required: true
        default: "new_resources"
        type: choice
        options:
          - new_resources      # CASO 1: Recursos nuevos (JSON files -> crear todo)
          - existing_resources # CASO 2: Recursos existentes (JSON files -> solo VM)
      env:
        description: "Environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_LOG: INFO

jobs:
  orchestrator:
    name: 'Azure Orchestrator (OCI Pattern)'
    env:
      TF_ACTION_WORKSPACE: "default"
      DEPLOYMENT_TYPE: ${{ github.event.inputs.deployment_type || 'new_resources' }}
            
    runs-on: self-hosted
    permissions:
      pull-requests: write
      actions: read
      contents: read
    
    steps:
    # Checkout the repository to the GitHub Actions runner
    - name: 'Checkout'
      uses: actions/checkout@v4

    # Runner package dependencies  
    - uses: actions/setup-node@v2
      with:
        node-version: '20'  

    # Azure Login using OIDC
    - name: 'Setup Azure Authentication'
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # Setup Terraform Binary
    - name: 'Setup Terraform'
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.12.1
        terraform_wrapper: true

    # Generate SSH Key for VM Access
    - name: 'Generate SSH Key for VM'
      id: ssh-key
      run: |
        mkdir -p ~/.ssh
        ssh-keygen -t rsa -b 4096 -f ~/.ssh/azure_vm_key -N ""
        chmod 600 ~/.ssh/azure_vm_key
        chmod 644 ~/.ssh/azure_vm_key.pub
        echo "SSH key generated successfully"
        ls -la ~/.ssh/azure_vm_key*

    # ✅ Validar estructura JSON (Patrón OCI)
    - name: 'Validate JSON Configuration (OCI Pattern)'
      id: validate-json
      run: |
        echo "🔍 Validating OCI Landing Zones JSON structure..."
        
        # Verificar estructura de directorios requerida
        required_dirs=("config/iam" "config/network" "config/security" "config/compute")
        for dir in "${required_dirs[@]}"; do
          if [ ! -d "$dir" ]; then
            echo "❌ Error: Required directory $dir not found"
            exit 1
          fi
          echo "✅ Directory found: $dir"
        done
        
        # Verificar archivos JSON requeridos (OCI pattern)
        required_files=(
          "config/iam/resource-groups.json"
          "config/network/networks.json" 
          "config/security/security-groups.json"
          "config/compute/virtual-machines.json"
        )
        
        for json_file in "${required_files[@]}"; do
          if [ ! -f "$json_file" ]; then
            echo "❌ Error: Required JSON file $json_file not found"
            exit 1
          fi
          
          echo "🔍 Validating $json_file..."
          if ! jq empty "$json_file" 2>/dev/null; then
            echo "❌ Invalid JSON syntax: $json_file"
            exit 1
          fi
          echo "✅ Valid JSON: $json_file"
        done
        
        echo "🎉 All JSON files validated successfully (OCI pattern)"

    # Landing Zone Terraform Orchestrator initialization
    - name: 'Terraform Init'
      id: init
      run: |
        terraform init
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true
    
    # Integration: Terraform Format
    - name: 'Terraform Format'
      id: format
      if: github.ref != 'refs/heads/main'
      run: terraform fmt -check
      
    # Test: Terraform Validate
    - name: 'Terraform Validate'
      id: validate
      if: github.ref != 'refs/heads/main' && (success() || failure())
      run: terraform validate -no-color
      
    # ✅ Plan usando var-files explícitos (OCI Pattern)
    - name: 'Terraform Plan (OCI Pattern)'
      id: plan
      if: github.event_name == 'pull_request'
      run: |
        echo "📋 Planning deployment using OCI Landing Zones pattern..."
        echo "Deployment Type: ${{ env.DEPLOYMENT_TYPE }}"
        
        terraform plan -no-color \
          -var-file=config/iam/resource-groups.json \
          -var-file=config/network/networks.json \
          -var-file=config/security/security-groups.json \
          -var-file=config/compute/virtual-machines.json \
          --out tfplan.binary
          
        echo "✅ Plan completed using explicit var-files"
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true

    # Send result of testing & integration to the pull request
    - name: 'Update Pull Request'
      uses: actions/github-script@v6
      if: github.event_name == 'pull_request' && (success() || failure())
      env:
        PLAN: "${{ steps.plan.outputs.stdout }}"
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const planOutput = process.env.PLAN || 'No plan generated';
          const deploymentType = process.env.DEPLOYMENT_TYPE;
          
          const output = `#### 🚀 Azure Orchestrator (OCI Landing Zones Pattern)
          **Deployment Type**: \`${deploymentType}\`
          **Pattern**: OCI Landing Zones with explicit var-files
          
          #### Terraform Status
          - **Format**: \`${{ steps.format.outcome }}\`
          - **Initialization**: \`${{ steps.init.outcome}}\`
          - **Validation**: \`${{ steps.validate.outcome }}\`
          - **JSON Configuration**: \`${{ steps.validate-json.outcome }}\`
          - **Plan**: \`${{ steps.plan.outcome }}\`
          
          <details><summary>📖 Show Terraform Plan</summary>
          
          \`\`\`terraform
          ${planOutput}
          \`\`\`
          
          </details>
          
          #### 🔧 Commands Used (OCI Pattern)
          \`\`\`bash
          terraform plan \\
            -var-file=config/iam/resource-groups.json \\
            -var-file=config/network/networks.json \\
            -var-file=config/security/security-groups.json \\
            -var-file=config/compute/virtual-machines.json
          \`\`\`
          
          *Mode: ${deploymentType === 'new_resources' ? '📋 CASO 1 - Create All Resources' : '🔗 CASO 2 - Use Existing + New VM'}*
          
          *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: output
          })
    
    # Integration: Show fail status if plan failed
    - name: 'Terraform Plan Status'
      if: steps.plan.outcome == 'failure'
      run: exit 1

    # ✅ Apply usando var-files explícitos (OCI Pattern)
    - name: 'Terraform Apply (OCI Pattern)'
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "🚀 Applying deployment using OCI Landing Zones pattern..."
        echo "Deployment Type: ${{ env.DEPLOYMENT_TYPE }}"
        
        terraform apply -no-color \
          -var-file=config/iam/resource-groups.json \
          -var-file=config/network/networks.json \
          -var-file=config/security/security-groups.json \
          -var-file=config/compute/virtual-machines.json \
          --auto-approve
          
        echo "✅ Apply completed using explicit var-files"
      env:
        ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
        ARM_USE_OIDC: true
      continue-on-error: false

    # ✅ Mostrar outputs estructurados por keys
    - name: 'Show Terraform Outputs (OCI Pattern)'
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        echo "🎯 === TERRAFORM OUTPUTS (Structured by Keys) ==="
        echo ""
        echo "📋 Resource Groups:"
        terraform output -json resource_groups 2>/dev/null || echo "No resource groups output"
        echo ""
        echo "🌐 Networks:"  
        terraform output -json networks 2>/dev/null || echo "No networks output"
        echo ""
        echo "🔒 Security Groups:"
        terraform output -json security_groups 2>/dev/null || echo "No security groups output"
        echo ""
        echo "💻 Virtual Machines:"
        terraform output -json virtual_machines 2>/dev/null || echo "No virtual machines output"
        echo ""
        echo "🏁 === DEPLOYMENT COMPLETED (OCI Pattern) ==="
        echo "Mode: ${{ env.DEPLOYMENT_TYPE }}"
        echo "Pattern: OCI Landing Zones with key-based references"